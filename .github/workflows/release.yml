# Release workflow — builds three distribution variants of telegram-cli
# and uploads them as GitHub Release assets (T16).
#
# Triggered by pushing a version tag:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Produces:
#   - telegram-cli.pyz       (ubuntu — shiv)
#   - telegram-cli.exe       (windows — PyInstaller)
#   - telegram-cli-macos.zip (macos — PyInstaller)
#   - user_manuals/*.pdf     (PDF versions of all manuals in telegram/telegram-cli/manuals/)
#
# Build logic lives in telegram/telegram-cli/tools/build_*.sh so the
# same scripts can be used for local builds.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------
  # 0. Quality Gate — ensure all tests pass before building
  # -------------------------------------------------------------------
  quality-gate:
    uses: ./.github/workflows/quality-gate.yml

  # -------------------------------------------------------------------
  # 1. Python variant (.pyz) — shiv on Ubuntu
  # -------------------------------------------------------------------
  build-pyz:
    needs: [quality-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ./telegram/telegram-lib

      - name: Build .pyz
        run: bash telegram/telegram-cli/tools/build_pyz.sh

      - name: Post-build tests
        run: |
          cd telegram/telegram-cli/dist
          python3 ../tests/post_build/run_post_build_test.py || exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telegram-cli-pyz
          path: telegram/telegram-cli/dist/telegram-cli.pyz

  # -------------------------------------------------------------------
  # 2. Windows variant (.exe) — PyInstaller
  # -------------------------------------------------------------------
  build-windows:
    needs: [quality-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ./telegram/telegram-lib

      - name: Build .exe
        shell: bash
        run: bash telegram/telegram-cli/tools/build_windows.sh

      - name: Post-build tests
        shell: bash
        run: |
          cd telegram/telegram-cli/dist
          python3 ../tests/post_build/run_post_build_test.py || exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telegram-cli-exe
          path: telegram/telegram-cli/dist/telegram-cli.exe

  # -------------------------------------------------------------------
  # 3. macOS variant — PyInstaller + zip
  # -------------------------------------------------------------------
  build-macos:
    needs: [quality-gate]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ./telegram/telegram-lib

      - name: Build macOS binary
        run: bash telegram/telegram-cli/tools/build_macos.sh

      - name: Post-build tests
        run: |
          cd telegram/telegram-cli/dist
          python3 ../tests/post_build/run_post_build_test.py || exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telegram-cli-macos
          path: telegram/telegram-cli/dist/telegram-cli-macos.zip

  # -------------------------------------------------------------------
  # 4. User Manuals — convert .md files to .pdf and collect in user_manuals/
  # -------------------------------------------------------------------
  build-user-manuals:
    needs: [quality-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandoc and weasyprint
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc
          pip install weasyprint

      - name: Convert manuals to PDF
        run: |
          mkdir -p user_manuals
          for f in telegram/telegram-cli/manuals/*.md; do
            base=$(basename "$f" .md)
            pandoc "$f" -o "user_manuals/${base}.pdf" --pdf-engine=weasyprint
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telegram-cli-manuals
          path: user_manuals/

  # -------------------------------------------------------------------
  # 5. Create GitHub Release and upload all assets
  # -------------------------------------------------------------------
  release:
    needs: [build-pyz, build-windows, build-macos, build-user-manuals]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check if stable tag
        id: check-tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-stable"* ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
          # Downloads all artifacts: telegram-cli-pyz, telegram-cli-exe,
          # telegram-cli-macos, and telegram-cli-manuals (PDFs)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
            files: |
              release-assets/telegram-cli.pyz
              release-assets/telegram-cli.exe
              release-assets/telegram-cli-macos.zip
              release-assets/*.pdf
            generate_release_notes: true
            draft: ${{ steps.check-tag.outputs.draft == 'true' }}
            prerelease: ${{ steps.check-tag.outputs.prerelease == 'true' }}

      - name: Remove source code archives
        if: always()
        run: |
          TAG="${{ github.ref_name }}"
          echo "Attempting to remove auto-generated source code archives for tag: $TAG"
          
          # Try to delete the zip and tar.gz archives that GitHub creates automatically
          for asset in "Source code (zip)" "Source code (tar.gz)"; do
            if gh release view "$TAG" --json assets -q '.assets[].name' | grep -q "^${asset}$"; then
              echo "Deleting: $asset"
              gh release delete-asset "$TAG" "$asset" 2>/dev/null || echo "Could not delete $asset (may be protected)"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
