# Quality Gate — intelligent commit control for the Synchromessotron monorepo.
#
# How it works:
#   1. The "detect-changes" job identifies which sub-projects were touched.
#   2. Downstream jobs run ONLY for affected sub-projects.
#   3. Each job uses the sub-project's native tooling (defined in its own
#      pyproject.toml / package.json / etc.).
#
# Adding a new sub-project:
#   1. Add a path filter in "detect-changes" → filters.
#   2. Add a corresponding output in "detect-changes" → outputs.
#   3. Create a new job that depends on "detect-changes" and checks that output.

name: Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

# ───────────────────────────────────────────────────────────────────────────
# 1. Detect which sub-projects have changed files
# ───────────────────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      telegram-lib: ${{ steps.filter.outputs.telegram-lib }}
      # ↓ future sub-projects register their outputs here
      # telegram-cli: ${{ steps.filter.outputs.telegram-cli }}
      # vkontakte:    ${{ steps.filter.outputs.vkontakte }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            telegram-lib:
              - 'telegram/telegram-lib/**'
            # ↓ future sub-projects register their path patterns here
            # telegram-cli:
            #   - 'telegram/telegram-cli/**'
            # vkontakte:
            #   - 'vkontakte/**'

  # ───────────────────────────────────────────────────────────────────────
  # 2. Sub-project jobs (run only when their files changed)
  # ───────────────────────────────────────────────────────────────────────

  telegram-lib:
    needs: detect-changes
    if: needs.detect-changes.outputs.telegram-lib == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram/telegram-lib
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: telegram/telegram-lib/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests
        run: pytest --tb=short

  # ↓ future sub-project jobs go here
  # telegram-cli:
  #   needs: detect-changes
  #   if: needs.detect-changes.outputs.telegram-cli == 'true'
  #   ...
